<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#0f766e" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="WFA" />
  <title>Wilderness First Aid</title>
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="icon" href="icons/icon.svg" type="image/svg+xml" />
  <link rel="apple-touch-icon" href="icons/apple-touch-icon.png" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header class="app-header">
    <div class="header-row">
      <h1 id="app-title">Wilderness First Aid</h1>
      <button id="edit-toggle" class="icon-btn" title="Edit mode" aria-pressed="false">Edit</button>
    </div>
    <div class="search-wrap">
      <input id="search-input" type="search" inputmode="search" placeholder="Search injuries, symptoms, STERI, pain…" autocomplete="off" />
      <button id="search-clear" class="clear-btn" aria-label="Clear search" hidden>&times;</button>
    </div>
  </header>

  <nav class="tabs" role="tablist">
    <button class="tab active" data-tab="injuries" role="tab">Injuries</button>
    <button class="tab" data-tab="assessment" role="tab">Assessment</button>
    <button class="tab" data-tab="data" role="tab">Data</button>
  </nav>

  <main id="view" class="view"></main>

  <div id="toast" class="toast" hidden></div>

  <script src="data.js"></script>
  <script src="app.js"></script>
</body>
</html>
