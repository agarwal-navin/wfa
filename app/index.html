<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#a91b1b" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Bearness" />
  <title>Bearness First Aid</title>
  <link rel="manifest" href="../manifest.webmanifest" />
  <link rel="icon" href="icons/icon-192.png" type="image/png" />
  <link rel="apple-touch-icon" href="icons/apple-touch-icon.png" />
  <link rel="stylesheet" href="styles.css" />
</head>

<body>
  <header class="app-header">
    <div class="header-row">
      <a class="brand" href="../index.html" title="About this app">
        <img class="brand-icon" src="icons/icon-192.png" alt="" />
        <h1 id="app-title">Bearness First Aid</h1>
      </a>
      <div class="header-actions">
        <button id="menu-toggle" class="menu-btn" aria-haspopup="true" aria-expanded="false" aria-label="Menu"
          title="Menu">☰</button>
        <div id="menu" class="menu" role="menu" hidden>
          <a class="menu-item" role="menuitem" href="../index.html">About / Home</a>
          <button id="edit-toggle" class="menu-item" role="menuitem" aria-pressed="false">Edit content</button>
          <a class="menu-item" role="menuitem" href="../install.html">Install &amp; use offline</a>
          <button id="data-toggle" class="menu-item" role="menuitem">Data &amp; backup</button>
        </div>
      </div>
    </div>
    <div class="search-wrap">
      <input id="search-input" type="search" inputmode="search" placeholder="Search injuries, symptoms ..."
        autocomplete="off" />
      <button id="search-clear" class="clear-btn" aria-label="Clear search" hidden>&times;</button>
    </div>
  </header>

  <nav class="tabs" role="tablist">
    <button class="tab active" data-tab="assessment" role="tab">Assessment</button>
    <button class="tab" data-tab="injuries" role="tab">Injuries</button>
    <button class="tab" data-tab="concepts" role="tab">Glossary</button>
  </nav>

  <div id="edit-mode-bar" class="edit-mode-bar" hidden>
    <span class="edit-mode-label">
      <span class="edit-mode-title">✎ Edit mode - tap an item to edit</span>
      <span class="edit-mode-sub">Saved on this device only - cleared if you clear your browser data</span>
    </span>
    <button id="edit-done" class="edit-bar-btn">Done</button>
  </div>

  <main id="view" class="view"></main>

  <div id="toast" class="toast" hidden></div>

  <script src="data.js"></script>
  <script src="app.js"></script>
</body>

</html>
